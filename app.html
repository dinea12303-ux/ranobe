<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Моя Библиотека</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0d0d14;color:#e8e8f0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh}

/* HEADER */
header{background:#13131f;border-bottom:1px solid rgba(255,255,255,.07);padding:0 16px;position:sticky;top:0;z-index:100}
.header-inner{max-width:900px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:52px}
.logo{font-size:1.1rem;font-weight:700;color:#fff}.logo span{color:#e05a5a}
.nav-tabs{display:flex;gap:4px}
.nav-btn{background:none;border:none;padding:6px 14px;border-radius:5px;color:rgba(255,255,255,.4);font-size:.82rem;cursor:pointer;transition:all .2s}
.nav-btn.active,.nav-btn:hover{background:rgba(255,255,255,.07);color:#fff}

/* SCREENS */
.screen{display:none;max-width:900px;margin:0 auto;padding:20px 16px 80px}
.screen.active{display:block}

/* SETUP */
.setup-box{max-width:480px;margin:60px auto;background:#13131f;border:1px solid rgba(255,255,255,.08);border-radius:10px;padding:28px}
.setup-box h2{font-size:1.1rem;margin-bottom:8px;color:#fff}
.setup-box p{font-size:.85rem;color:rgba(255,255,255,.4);margin-bottom:20px;line-height:1.6}
.input{width:100%;background:#0d0d14;border:1px solid rgba(255,255,255,.1);border-radius:6px;padding:10px 14px;color:#fff;font-size:.9rem;outline:none;transition:border-color .2s;margin-bottom:12px}
.input:focus{border-color:rgba(224,90,90,.5)}
.btn-primary{width:100%;padding:12px;background:#e05a5a;border:none;border-radius:6px;color:#fff;font-size:.9rem;font-weight:600;cursor:pointer;transition:opacity .2s}
.btn-primary:hover{opacity:.85}

/* LIBRARY */
.section-title{font-size:.68rem;letter-spacing:.4em;color:rgba(255,255,255,.3);text-transform:uppercase;margin-bottom:16px}
.books-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:16px;margin-bottom:32px}
.book-card{cursor:pointer;transition:transform .2s}
.book-card:hover{transform:translateY(-3px)}
.book-cover{width:100%;aspect-ratio:2/3;border-radius:8px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:12px;text-align:center;margin-bottom:8px;position:relative}
.book-cover-inner{width:100%;height:100%;border-radius:8px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:12px;text-align:center}
.book-icon{font-size:2rem;margin-bottom:8px}
.book-cover-title{font-size:.72rem;font-weight:700;color:#fff;line-height:1.3}
.book-card-title{font-size:.82rem;font-weight:600;color:#e8e8f0;margin-bottom:2px}
.book-card-meta{font-size:.72rem;color:rgba(255,255,255,.35)}

/* BOOK PAGE */
.book-header{display:flex;gap:20px;margin-bottom:24px;align-items:flex-start}
.book-cover-big{flex-shrink:0;width:100px;height:150px;border-radius:8px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:12px;text-align:center}
.book-title-big{font-size:1.3rem;font-weight:700;color:#fff;margin-bottom:6px}
.book-desc{font-size:.85rem;color:rgba(255,255,255,.4);line-height:1.6;margin-bottom:16px}
.ch-count{font-size:.78rem;color:#e05a5a;margin-bottom:20px}
.ch-list-item{display:flex;align-items:center;gap:12px;padding:13px 14px;margin-bottom:4px;background:#13131f;border:1px solid rgba(255,255,255,.05);border-radius:6px;cursor:pointer;transition:all .2s}
.ch-list-item:hover{background:#1a1a28;border-color:rgba(224,90,90,.3)}
.ch-num{font-size:.72rem;color:#e05a5a;min-width:40px;font-weight:600}
.ch-name{flex:1;font-size:.92rem}
.ch-arrow{color:rgba(255,255,255,.2)}
.btn-back{background:none;border:1px solid rgba(255,255,255,.1);color:rgba(255,255,255,.5);padding:7px 14px;border-radius:5px;cursor:pointer;font-size:.82rem;margin-bottom:20px;transition:all .2s}
.btn-back:hover{border-color:rgba(255,255,255,.3);color:#fff}

/* PLAYER */
.player-header{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.player-title{flex:1;font-size:1rem;font-weight:700;color:#fff}
.player-book{font-size:.75rem;color:rgba(255,255,255,.35);margin-bottom:16px}
.player-box{background:#13131f;border-radius:10px;padding:16px;margin-bottom:16px}
.progress-bar{width:100%;height:3px;background:rgba(255,255,255,.08);border-radius:2px;cursor:pointer;margin-bottom:6px}
.progress-fill{height:100%;width:0%;background:#e05a5a;border-radius:2px;pointer-events:none;transition:width .15s}
.progress-row{display:flex;justify-content:space-between;margin-bottom:14px}
.progress-row span{font-size:.65rem;color:rgba(255,255,255,.25)}
.controls{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:14px}
.ctrl-btn{background:none;border:1px solid rgba(255,255,255,.1);color:rgba(255,255,255,.4);border-radius:5px;padding:7px 12px;font-size:.78rem;cursor:pointer;transition:all .15s}
.ctrl-btn:hover{border-color:rgba(255,255,255,.3);color:#fff}
.play-btn{width:46px;height:46px;border-radius:50%;background:#e05a5a;border:none;color:#fff;font-size:1.1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 16px rgba(224,90,90,.4);transition:transform .15s;flex-shrink:0}
.play-btn:hover{transform:scale(1.08)}
.sliders{display:flex;gap:16px}
.s-row{display:flex;align-items:center;gap:8px;flex:1}
.s-label{font-size:.67rem;color:rgba(255,255,255,.3);white-space:nowrap}
input[type=range]{flex:1;-webkit-appearance:none;height:2px;background:rgba(255,255,255,.1);border-radius:1px;outline:none;cursor:pointer}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;background:#e05a5a;border-radius:50%;cursor:pointer}
.s-val{font-size:.67rem;color:#e05a5a;min-width:26px;text-align:right}
.reading-area{background:#13131f;border-radius:8px;padding:16px;max-height:280px;overflow-y:auto;font-size:.92rem;line-height:1.85;color:rgba(232,232,240,.7)}
.reading-area p{margin-bottom:.8em}
.reading-area p.hl{background:rgba(224,90,90,.08);border-left:2px solid #e05a5a;padding-left:8px;border-radius:0 3px 3px 0;color:#fff}

/* ADD FORM */
.form-box{background:#13131f;border-radius:10px;padding:20px;margin-bottom:16px}
.form-box h3{font-size:.9rem;font-weight:600;color:#fff;margin-bottom:16px}
.form-label{font-size:.68rem;color:rgba(255,255,255,.35);text-transform:uppercase;letter-spacing:.2em;margin-bottom:6px;display:block}
.form-group{margin-bottom:14px}
.textarea{width:100%;background:#0d0d14;border:1px solid rgba(255,255,255,.1);border-radius:6px;padding:10px 14px;color:#fff;font-size:.9rem;outline:none;min-height:200px;resize:vertical;line-height:1.7;font-family:inherit;transition:border-color .2s}
.textarea:focus{border-color:rgba(224,90,90,.4)}
.select{width:100%;background:#0d0d14;border:1px solid rgba(255,255,255,.1);border-radius:6px;padding:10px 14px;color:#fff;font-size:.9rem;outline:none}
.save-msg{text-align:center;color:#4caf50;font-size:.82rem;padding:8px;display:none}
.error-msg{text-align:center;color:#e05a5a;font-size:.82rem;padding:8px;display:none}

/* ADD BOOK */
.add-book-section{margin-top:24px}

/* LOADING */
.loading{text-align:center;padding:40px;color:rgba(255,255,255,.3);font-size:.9rem}

/* COLORS */
.c1{background:linear-gradient(135deg,#1a0a0a,#2e1a1a);border:1px solid rgba(224,90,90,.2)}
.c2{background:linear-gradient(135deg,#0a0a1a,#1a1a2e);border:1px solid rgba(100,149,237,.2)}
.c3{background:linear-gradient(135deg,#0a1a0a,#1a2e1a);border:1px solid rgba(90,180,90,.2)}
.c4{background:linear-gradient(135deg,#1a100a,#2e201a);border:1px solid rgba(200,150,80,.2)}
.c5{background:linear-gradient(135deg,#1a0a1a,#2e1a2e);border:1px solid rgba(180,90,180,.2)}
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo">Моя<span>Библиотека</span></div>
    <div class="nav-tabs">
      <button class="nav-btn active" onclick="showScreen('library',this)">📚</button>
      <button class="nav-btn" onclick="showScreen('add',this)">＋</button>
      <button class="nav-btn" onclick="showScreen('settings',this)">⚙</button>
    </div>
  </div>
</header>

<!-- SETUP SCREEN -->
<div id="screen-setup" class="screen active">
  <div class="setup-box">
    <h2>Первый запуск</h2>
    <p>Введи свой API ключ от JSONBin.io — он сохранится в браузере и больше не понадобится.</p>
    <input class="input" id="apiKeyInput" placeholder="$2a$10$..." type="password">
    <button class="btn-primary" onclick="saveApiKey()">Сохранить и войти</button>
  </div>
</div>

<!-- LIBRARY SCREEN -->
<div id="screen-library" class="screen">
  <div id="libraryContent"><div class="loading">Загрузка...</div></div>
</div>

<!-- BOOK SCREEN -->
<div id="screen-book" class="screen">
  <button class="btn-back" onclick="showScreen('library',null)">← Назад</button>
  <div id="bookContent"></div>
</div>

<!-- PLAYER SCREEN -->
<div id="screen-player" class="screen">
  <button class="btn-back" onclick="goBackFromPlayer()">← К главам</button>
  <div class="player-book" id="playerBook"></div>
  <div class="player-title" id="playerTitle">—</div>
  <div class="player-box">
    <div class="progress-bar" onclick="seekTo(event)">
      <div class="progress-fill" id="pFill"></div>
    </div>
    <div class="progress-row">
      <span id="pPct">0%</span><span id="pTotal">—</span>
    </div>
    <div class="controls">
      <button class="ctrl-btn" onclick="restart()">↺</button>
      <button class="ctrl-btn" onclick="back30()">−30с</button>
      <button class="play-btn" onclick="togglePlay()" id="playBtn">▶</button>
      <button class="ctrl-btn" onclick="fwd30()">+30с</button>
      <button class="ctrl-btn" onclick="stopAll()">■</button>
    </div>
    <div class="sliders">
      <div class="s-row">
        <span class="s-label">Скорость</span>
        <input type="range" min="0.5" max="2.5" step="0.1" value="1" oninput="setRate(this.value)">
        <span class="s-val" id="rateVal">1×</span>
      </div>
      <div class="s-row">
        <span class="s-label">Громкость</span>
        <input type="range" min="0" max="1" step="0.05" value="1" oninput="setVol(this.value)">
        <span class="s-val" id="volVal">100%</span>
      </div>
    </div>
  </div>
  <div class="reading-area" id="readingArea"></div>
</div>

<!-- ADD SCREEN -->
<div id="screen-add" class="screen">
  <div class="form-box">
    <h3>Добавить главу</h3>
    <div class="form-group">
      <label class="form-label">Книга</label>
      <select class="select" id="selectBook"></select>
    </div>
    <div class="form-group">
      <label class="form-label">Название главы</label>
      <input class="input" id="chapterTitle" placeholder="Например: Глава 5 — Первое подземелье">
    </div>
    <div class="form-group">
      <label class="form-label">Текст главы</label>
      <textarea class="textarea" id="chapterText" placeholder="Вставь сюда весь текст главы..."></textarea>
    </div>
    <button class="btn-primary" onclick="addChapter()">Сохранить главу</button>
    <div class="save-msg" id="saveMsg">✓ Глава сохранена!</div>
    <div class="error-msg" id="errorMsg">Ошибка. Проверь API ключ.</div>
  </div>

  <div class="add-book-section">
    <div class="form-box">
      <h3>Добавить новую книгу</h3>
      <div class="form-group">
        <label class="form-label">Название книги</label>
        <input class="input" id="bookTitle" placeholder="Например: Великий Некромант">
      </div>
      <div class="form-group">
        <label class="form-label">Иконка (эмодзи)</label>
        <input class="input" id="bookIcon" placeholder="💀" maxlength="2">
      </div>
      <button class="btn-primary" onclick="addBook()">Добавить книгу</button>
    </div>
  </div>
</div>

<!-- SETTINGS -->
<div id="screen-settings" class="screen">
  <div class="form-box">
    <h3>Настройки</h3>
    <div class="form-group">
      <label class="form-label">API ключ JSONBin</label>
      <input class="input" id="apiKeyDisplay" type="password" placeholder="Текущий ключ скрыт">
    </div>
    <button class="btn-primary" onclick="updateApiKey()">Обновить ключ</button>
  </div>
</div>

<script>
const COLORS = ['c1','c2','c3','c4','c5'];
let currentBookId = null;
let currentBookName = '';
let data = { books: [], chapters: [] };

// ── API KEY ──
function getKey(){ return localStorage.getItem('jb_key'); }
function saveApiKey(){
  const k = document.getElementById('apiKeyInput').value.trim();
  if(!k){ alert('Введи ключ!'); return; }
  localStorage.setItem('jb_key', k);
  init();
}
function updateApiKey(){
  const k = document.getElementById('apiKeyDisplay').value.trim();
  if(!k){ alert('Введи ключ!'); return; }
  localStorage.setItem('jb_key', k);
  alert('Ключ обновлён!');
}

// ── JSONBIN ──
const BIN_KEY = 'jb_bin_id';
async function getBinId(){
  let id = localStorage.getItem(BIN_KEY);
  if(id) return id;
  // создаём новый bin
  const res = await fetch('https://api.jsonbin.io/v3/b', {
    method:'POST',
    headers:{'Content-Type':'application/json','X-Master-Key':getKey(),'X-Bin-Name':'ranobe'},
    body: JSON.stringify({books:[],chapters:[]})
  });
  const json = await res.json();
  id = json.metadata?.id;
  if(id){ localStorage.setItem(BIN_KEY, id); return id; }
  throw new Error('Не удалось создать хранилище');
}

async function loadData(){
  const id = await getBinId();
  const res = await fetch(`https://api.jsonbin.io/v3/b/${id}/latest`, {
    headers:{'X-Master-Key':getKey()}
  });
  const json = await res.json();
  data = json.record || {books:[],chapters:[]};
  if(!data.books) data.books=[];
  if(!data.chapters) data.chapters=[];
}

async function saveData(){
  const id = await getBinId();
  await fetch(`https://api.jsonbin.io/v3/b/${id}`, {
    method:'PUT',
    headers:{'Content-Type':'application/json','X-Master-Key':getKey()},
    body: JSON.stringify(data)
  });
}

// ── INIT ──
async function init(){
  if(!getKey()){
    showScreen('setup', null);
    return;
  }
  try {
    await loadData();
    renderLibrary();
    renderBookSelect();
    showScreen('library', document.querySelector('.nav-btn'));
  } catch(e) {
    showScreen('setup', null);
  }
}

// ── SCREENS ──
function showScreen(name, btn){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('screen-'+name).classList.add('active');
  if(btn){
    document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
  }
  if(name==='library') renderLibrary();
  if(name==='add') renderBookSelect();
}

// ── LIBRARY ──
function renderLibrary(){
  const el = document.getElementById('libraryContent');
  if(!data.books.length){
    el.innerHTML='<div class="loading">Нет книг. Нажми + чтобы добавить.</div>'; return;
  }
  const cards = data.books.map((b,i)=>{
    const count = data.chapters.filter(c=>c.bookId===b.id).length;
    return `<div class="book-card" onclick="openBook('${b.id}')">
      <div class="book-cover">
        <div class="book-cover-inner ${COLORS[i%5]}">
          <div class="book-icon">${b.icon||'📖'}</div>
          <div class="book-cover-title">${b.title}</div>
        </div>
      </div>
      <div class="book-card-title">${b.title}</div>
      <div class="book-card-meta">${count} гл.</div>
    </div>`;
  }).join('');
  el.innerHTML=`<p class="section-title">Мои книги</p><div class="books-grid">${cards}</div>`;
}

function openBook(bookId){
  const book = data.books.find(b=>b.id===bookId);
  if(!book) return;
  currentBookId = bookId;
  currentBookName = book.title;
  const chapters = data.chapters.filter(c=>c.bookId===bookId);
  const chList = chapters.length
    ? chapters.map((ch,i)=>`
        <div class="ch-list-item" onclick="openChapter('${ch.id}')">
          <span class="ch-num">Гл.${i+1}</span>
          <span class="ch-name">${ch.title}</span>
          <span class="ch-arrow">›</span>
        </div>`).join('')
    : '<div class="loading">Нет глав. Добавь через +</div>';

  document.getElementById('bookContent').innerHTML=`
    <div class="book-header">
      <div class="book-cover-big ${COLORS[data.books.indexOf(book)%5]}">
        <div style="font-size:2rem">${book.icon||'📖'}</div>
      </div>
      <div>
        <div class="book-title-big">${book.title}</div>
        <div class="book-desc">${chapters.length} глав</div>
      </div>
    </div>
    <p class="section-title">Главы</p>
    ${chList}`;
  showScreen('book', null);
}

function openChapter(chId){
  const ch = data.chapters.find(c=>c.id===chId);
  if(!ch) return;
  document.getElementById('playerBook').textContent = currentBookName;
  document.getElementById('playerTitle').textContent = ch.title;
  // render text
  const area = document.getElementById('readingArea');
  const paras = ch.text.trim().split(/\n\s*\n/).filter(p=>p.trim());
  area.innerHTML = paras.map(p=>`<p>${p.replace(/\n/g,' ').trim()}</p>`).join('');
  showScreen('player', null);
  buildSentences();
  speakFrom(0);
}

function goBackFromPlayer(){
  stopAll();
  openBook(currentBookId);
}

// ── ADD ──
function renderBookSelect(){
  const sel = document.getElementById('selectBook');
  sel.innerHTML = data.books.map(b=>`<option value="${b.id}">${b.title}</option>`).join('');
}

async function addChapter(){
  const bookId = document.getElementById('selectBook').value;
  const title = document.getElementById('chapterTitle').value.trim();
  const text = document.getElementById('chapterText').value.trim();
  if(!bookId||!title||!text){ alert('Заполни все поля!'); return; }
  data.chapters.push({ id: Date.now().toString(), bookId, title, text });
  try {
    await saveData();
    document.getElementById('chapterTitle').value='';
    document.getElementById('chapterText').value='';
    document.getElementById('saveMsg').style.display='block';
    setTimeout(()=>document.getElementById('saveMsg').style.display='none',2500);
  } catch(e) {
    document.getElementById('errorMsg').style.display='block';
    setTimeout(()=>document.getElementById('errorMsg').style.display='none',3000);
  }
}

async function addBook(){
  const title = document.getElementById('bookTitle').value.trim();
  const icon = document.getElementById('bookIcon').value.trim() || '📖';
  if(!title){ alert('Введи название!'); return; }
  data.books.push({ id: Date.now().toString(), title, icon });
  await saveData();
  document.getElementById('bookTitle').value='';
  document.getElementById('bookIcon').value='';
  renderBookSelect();
  alert('Книга добавлена!');
}

// ── TTS ──
const synth = window.speechSynthesis;
let sentences=[], idx=0, playing=false, rate=1, vol=1;

function buildSentences(){
  sentences=[];
  document.querySelectorAll('#readingArea p').forEach((p,pi)=>{
    (p.textContent.match(/[^.!?…]+[.!?…]*/g)||[p.textContent])
      .forEach(s=>{ if(s.trim()) sentences.push({text:s.trim(),pi}); });
  });
  document.getElementById('pTotal').textContent=sentences.length+' фраз';
}

function speakFrom(i){
  synth.cancel();
  if(i>=sentences.length){playing=false;updateBtn();updateProg();return;}
  idx=i;playing=true;updateBtn();updateProg();hlPara(sentences[i].pi);
  const u=new SpeechSynthesisUtterance(sentences[i].text);
  u.lang='ru-RU';u.rate=rate;u.volume=vol;
  u.onend=()=>speakFrom(idx+1);
  synth.speak(u);
}
function togglePlay(){
  if(playing){synth.pause();playing=false;}
  else if(synth.paused){synth.resume();playing=true;}
  else speakFrom(idx);
  updateBtn();
}
function stopAll(){synth.cancel();playing=false;idx=0;updateBtn();updateProg();clearHl();}
function restart(){speakFrom(0);}
function back30(){speakFrom(Math.max(0,idx-Math.round(15*rate)));}
function fwd30(){speakFrom(Math.min(sentences.length-1,idx+Math.round(15*rate)));}
function setRate(v){rate=parseFloat(v);document.getElementById('rateVal').textContent=rate.toFixed(1)+'×';}
function setVol(v){vol=parseFloat(v);document.getElementById('volVal').textContent=Math.round(v*100)+'%';}
function updateBtn(){document.getElementById('playBtn').textContent=playing?'⏸':'▶';}
function updateProg(){
  const p=sentences.length?Math.round(idx/sentences.length*100):0;
  document.getElementById('pFill').style.width=p+'%';
  document.getElementById('pPct').textContent=p+'%';
}
function hlPara(pi){
  document.querySelectorAll('#readingArea p').forEach((p,i)=>{
    p.classList.toggle('hl',i===pi);
    if(i===pi)p.scrollIntoView({behavior:'smooth',block:'nearest'});
  });
}
function clearHl(){document.querySelectorAll('#readingArea p').forEach(p=>p.classList.remove('hl'));}
function seekTo(e){
  if(!sentences.length)return;
  const r=e.currentTarget.getBoundingClientRect();
  speakFrom(Math.floor((e.clientX-r.left)/r.width*sentences.length));
}

// START
init();
</script>
</body>
</html>
