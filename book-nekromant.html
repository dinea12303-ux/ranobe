<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Великий Некромант</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0d0d14;color:#e8e8f0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh}

header{background:#13131f;border-bottom:1px solid rgba(255,255,255,.07);padding:0 16px;position:sticky;top:0;z-index:100}
.header-inner{max-width:900px;margin:0 auto;display:flex;align-items:center;gap:12px;height:52px}
.back{color:rgba(255,255,255,.5);text-decoration:none;font-size:.9rem;transition:color .2s}
.back:hover{color:#fff}
.header-title{font-size:.95rem;font-weight:600;color:#fff;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

main{max-width:900px;margin:0 auto;padding:24px 16px 80px}

/* BOOK INFO */
.book-info{display:flex;gap:20px;margin-bottom:32px;align-items:flex-start}

.book-cover-big{
  flex-shrink:0;width:110px;height:165px;border-radius:8px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  text-align:center;padding:12px;
  background:linear-gradient(135deg,#1a0a0a,#2e1a1a);
  border:1px solid rgba(224,90,90,.2);
}
.cover-icon-big{font-size:2.2rem;margin-bottom:8px}
.cover-title-big{font-size:.72rem;font-weight:700;color:#fff;line-height:1.3}

.book-details{flex:1;min-width:0}
.book-title{font-size:1.2rem;font-weight:700;color:#fff;margin-bottom:6px;line-height:1.3}
.book-tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
.tag{font-size:.68rem;padding:3px 8px;border-radius:3px;background:rgba(255,255,255,.07);color:rgba(255,255,255,.5)}
.book-desc{font-size:.88rem;line-height:1.7;color:rgba(255,255,255,.5)}

/* STATS */
.stats{display:flex;gap:20px;margin-bottom:28px;padding:14px 16px;
  background:#13131f;border-radius:8px;border:1px solid rgba(255,255,255,.06)}
.stat{text-align:center;flex:1}
.stat-num{font-size:1.2rem;font-weight:700;color:#e05a5a;display:block}
.stat-label{font-size:.68rem;color:rgba(255,255,255,.3);text-transform:uppercase;letter-spacing:.1em}

/* CHAPTERS */
.section-title{font-size:.7rem;letter-spacing:.4em;color:rgba(255,255,255,.3);text-transform:uppercase;margin-bottom:12px}

.ch-item{
  display:flex;align-items:center;gap:12px;
  padding:12px 14px;margin-bottom:4px;
  background:#13131f;border:1px solid rgba(255,255,255,.05);
  border-radius:6px;text-decoration:none;color:inherit;
  transition:all .2s;
}
.ch-item:hover{background:#1a1a28;border-color:rgba(224,90,90,.3)}

.ch-num{font-size:.72rem;color:#e05a5a;min-width:36px;font-weight:600}
.ch-name{flex:1;font-size:.92rem;color:#e8e8f0}
.ch-new{font-size:.62rem;background:rgba(224,90,90,.15);color:#e05a5a;
  padding:2px 7px;border-radius:3px;white-space:nowrap}
.ch-arrow{color:rgba(255,255,255,.2);font-size:.85rem}
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <a href="index.html" class="back">←</a>
    <!-- ИЗМЕНИ: название книги -->
    <div class="header-title">Великий Некромант</div>
  </div>
</header>

<main>

  <div class="book-info">
    <div class="book-cover-big">
      <div class="cover-icon-big">💀</div>
      <!-- ИЗМЕНИ: название -->
      <div class="cover-title-big">Великий Некромант</div>
    </div>
    <div class="book-details">
      <!-- ИЗМЕНИ: всё ниже под свою книгу -->
      <h1 class="book-title">Великий Некромант</h1>
      <div class="book-tags">
        <span class="tag">LitRPG</span>
        <span class="tag">Фэнтези</span>
        <span class="tag">Прокачка</span>
      </div>
      <p class="book-desc">Линь Моюй получает профессию Некроманта и начинает путь к вершине силы через подземелья и сражения.</p>
    </div>
  </div>

  <div class="stats">
    <!-- ИЗМЕНИ: количество глав -->
    <div class="stat"><span class="stat-num" id="chCount">0</span><span class="stat-label">Глав</span></div>
    <div class="stat"><span class="stat-num">↑</span><span class="stat-label">Активна</span></div>
    <div class="stat"><span class="stat-num">RU</span><span class="stat-label">Язык</span></div>
  </div>

  <p class="section-title">Список глав</p>

  <!-- ГЛАВЫ — добавляй по образцу -->
  <a href="ch-nekromant-1.html" class="ch-item">
    <span class="ch-num">Гл. 1</span>
    <span class="ch-name">Церемония получения профессии</span>
    <span class="ch-new">новая</span>
    <span class="ch-arrow">›</span>
  </a>

  <!-- ОБРАЗЕЦ:
  <a href="ch-nekromant-2.html" class="ch-item">
    <span class="ch-num">Гл. 2</span>
    <span class="ch-name">Название главы</span>
    <span class="ch-arrow">›</span>
  </a>
  -->

</main>

<script>
  // Автосчётчик глав
  document.getElementById('chCount').textContent = document.querySelectorAll('.ch-item').length;
</script>

</body>
</html>
