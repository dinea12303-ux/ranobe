<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Моя библиотека</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0d0d14;color:#e8e8f0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh}

/* HEADER */
header{background:#13131f;border-bottom:1px solid rgba(255,255,255,.07);padding:0 16px;position:sticky;top:0;z-index:100}
.header-inner{max-width:1100px;margin:0 auto;display:flex;align-items:center;gap:16px;height:52px}
.logo{font-size:1.1rem;font-weight:700;color:#fff;letter-spacing:.02em}
.logo span{color:#e05a5a}

/* MAIN */
main{max-width:1100px;margin:0 auto;padding:24px 16px 80px}

.section-title{font-size:.7rem;letter-spacing:.4em;color:rgba(255,255,255,.3);text-transform:uppercase;margin-bottom:16px}

/* BOOK GRID */
.books-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:16px}

.book-card{text-decoration:none;color:inherit;display:block;transition:transform .2s}
.book-card:hover{transform:translateY(-3px)}

.book-cover{
  width:100%;aspect-ratio:2/3;border-radius:6px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:12px;text-align:center;position:relative;overflow:hidden;
  margin-bottom:8px;
}
.book-cover img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0;border-radius:6px}
.book-cover-placeholder{
  width:100%;height:100%;border-radius:6px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:12px;text-align:center;
}

.book-card-title{font-size:.82rem;font-weight:600;color:#e8e8f0;line-height:1.3;margin-bottom:2px;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.book-card-meta{font-size:.72rem;color:rgba(255,255,255,.35)}

/* COLORS FOR COVERS */
.cover-1{background:linear-gradient(135deg,#1a1a2e,#16213e);border:1px solid rgba(100,149,237,.2)}
.cover-2{background:linear-gradient(135deg,#1a0a0a,#2e1a1a);border:1px solid rgba(224,90,90,.2)}
.cover-3{background:linear-gradient(135deg,#0a1a0a,#1a2e1a);border:1px solid rgba(90,180,90,.2)}
.cover-4{background:linear-gradient(135deg,#1a1a0a,#2e2e1a);border:1px solid rgba(200,180,80,.2)}

.cover-title{font-size:.75rem;font-weight:700;color:#fff;letter-spacing:.05em;line-height:1.3;
  position:relative;z-index:1;text-shadow:0 1px 3px rgba(0,0,0,.8)}
.cover-icon{font-size:1.8rem;margin-bottom:8px;position:relative;z-index:1}

/* ADD BOOK */
.add-book{
  border:1px dashed rgba(255,255,255,.1);border-radius:6px;
  aspect-ratio:2/3;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  color:rgba(255,255,255,.2);font-size:.8rem;cursor:pointer;
  transition:all .2s;text-decoration:none;
}
.add-book:hover{border-color:rgba(255,255,255,.25);color:rgba(255,255,255,.4)}
.add-book .plus{font-size:1.8rem;margin-bottom:6px;line-height:1}
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo">Моя<span>Библиотека</span></div>
  </div>
</header>

<main>
  <p class="section-title">Мои книги</p>

  <div class="books-grid">

    <!-- КНИГА 1 — меняй href, название, количество глав -->
    <a href="book-nekromant.html" class="book-card">
      <div class="book-cover">
        <div class="book-cover-placeholder cover-2">
          <div class="cover-icon">💀</div>
          <div class="cover-title">Великий Некромант</div>
        </div>
      </div>
      <div class="book-card-title">Великий Некромант</div>
      <div class="book-card-meta">1 глава</div>
    </a>

    <!-- КНИГА 2 — раскомментируй и заполни когда добавишь
    <a href="book-название.html" class="book-card">
      <div class="book-cover">
        <div class="book-cover-placeholder cover-1">
          <div class="cover-icon">⚔️</div>
          <div class="cover-title">Название книги</div>
        </div>
      </div>
      <div class="book-card-title">Название книги</div>
      <div class="book-card-meta">0 глав</div>
    </a>
    -->

    <!-- Кнопка добавить (просто декоративная) -->
    <div class="add-book">
      <div class="plus">+</div>
      <div>Новая книга</div>
    </div>

  </div>
</main>

</body>
</html>
